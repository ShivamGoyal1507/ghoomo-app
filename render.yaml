databases:
  - name: ghoomo-db
    plan: free
    databaseName: ghoomo
    user: ghoomo_user

services:
  - type: web
    name: ghoomo-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: ghoomo-db
          property: connectionString
