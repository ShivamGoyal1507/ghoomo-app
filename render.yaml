services:
  - type: web
    name: ghoomo-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_BOOTSTRAP_FROM_JSON
        value: "false"
